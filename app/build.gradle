plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sockc.unicomhook'
    compileSdk 34

    defaultConfig {
        applicationId "com.sockc.unicomhook"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
